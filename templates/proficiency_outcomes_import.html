{% extends "base.html" %}
{% block content %}
<div class="card">
  <div class="row" style="justify-content:space-between; align-items:center;">
    <div>
      <h3 style="margin:0;">Import learning outcomes</h3>
      <p class="muted" style="margin-top:6px;">Paste JSON or upload a JSON file. Existing outcomes remain unchanged.</p>
    </div>
    <a class="btn" href="{{ url_for('proficiency_outcomes_list') }}">Back</a>
  </div>
</div>
<div class="sp"></div>
<div class="card">
  {% if error %}
    <p class="text-danger">{{ error }}</p>
  {% endif %}
  <form method="post" enctype="multipart/form-data">
    <input type="hidden" name="csrf" value="{{ csrf_token() }}">
    <label>Upload JSON file</label>
    <input type="file" name="payload_file" accept=".json,application/json">
    <div class="sp"></div>
    <label>Or paste outcome JSON</label>
    <textarea name="payload" rows="18" style="width:100%; font-family:ui-monospace;">{{ payload }}</textarea>
    <div class="sp"></div>
    <button class="btn btn-primary" type="submit">Import outcomes</button>
  </form>
</div>
<div class="sp"></div>
<div class="card">
  <h3 style="margin:0;">Schema</h3>
  <p class="muted" style="margin-top:6px;">Use a raw array or an object with an <code>outcomes</code> array.</p>
  <pre class="code-block" style="max-height:320px; overflow:auto;">{{ schema_json }}</pre>
</div>
{% endblock %}
